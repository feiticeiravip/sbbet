<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

/* APP */

.app{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    overflow:hidden;
}

/* IFRAME */

iframe{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    border:none;
    background:#000;
    overflow:auto;
    -webkit-overflow-scrolling:touch;
    touch-action:auto;
}

/* WHATSAPP */

.whatsapp-btn{
    position:fixed;
    right:14px;
    bottom:14px;
    width:48px;
    height:48px;
    border-radius:50%;
    background:#25D366;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:999999;
    text-decoration:none;
    box-shadow:0 0 18px rgba(37,211,102,0.4);
}

.whatsapp-btn svg{
    width:24px;
    height:24px;
    fill:#fff;
}

/* POPUP */

.popup-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999999;
    padding:15px;
}

.popup-box{
    width:100%;
    max-width:900px;
    position:relative;
}

.popup-box img{
    width:100%;
    display:block;
    border-radius:16px;
}

.close-popup{
    position:absolute;
    top:-12px;
    right:-12px;
    width:40px;
    height:40px;
    border-radius:50%;
    border:none;
    background:#000;
    color:#fff;
    font-size:24px;
    font-weight:bold;
    cursor:pointer;
    border:2px solid #fff;
}

/* MOBILE */

@media (max-width:768px){

    html,
    body{
        width:100%;
        height:100%;
        overflow:hidden;
        overscroll-behavior:none;
        position:fixed;
    }

    .app{
        width:100%;
        height:100%;
        position:fixed;
        inset:0;
    }

    iframe{
        width:100%;
        height:100%;
        min-height:100%;
        overflow:auto;
        -webkit-overflow-scrolling:touch;
        touch-action:auto;
    }

    .whatsapp-btn{
        width:46px;
        height:46px;
        right:12px;
        bottom:12px;
    }

    .whatsapp-btn svg{
        width:22px;
        height:22px;
    }

}
