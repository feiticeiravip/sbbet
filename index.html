<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:Arial,sans-serif;
}

/* CONTAINER */

.site-wrapper{
    width:100%;
    height:100vh;
    overflow:hidden;
}

/* IFRAME */

iframe{
    width:100%;
    height:100vh;
    border:none;
    display:block;
    background:#000;
}

/* WHATSAPP */

.whatsapp-btn{
    position:fixed;
    bottom:14px;
    right:14px;
    width:46px;
    height:46px;
    border-radius:50%;
    background:#25D366;
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    z-index:999;
    box-shadow:0 0 18px rgba(37,211,102,0.35);
    transition:0.25s;
}

.whatsapp-btn:hover{
    transform:scale(1.07);
}

.whatsapp-btn svg{
    width:24px;
    height:24px;
    fill:#fff;
}

/* POPUP */

.popup-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.82);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
    padding:18px;
}

.popup-box{
    position:relative;
    width:100%;
    max-width:900px;
    animation:fade 0.35s ease;
}

.popup-box img{
    width:100%;
    display:block;
    border-radius:16px;
    box-shadow:0 0 40px rgba(0,0,0,0.55);
}

.close-popup{
    position:absolute;
    top:-12px;
    right:-12px;
    width:38px;
    height:38px;
    border:none;
    border-radius:50%;
    background:#000;
    color:#fff;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    border:2px solid #fff;
}

@keyframes fade{
    from{
        opacity:0;
        transform:scale(0.93);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

/* MOBILE */

@media(max-width:768px){

    iframe{
        height:100dvh;
    }

    .whatsapp-btn{
        width:42px;
        height:42px;
        bottom:12px;
        right:12px;
    }

    .whatsapp-btn svg{
        width:21px;
        height:21px;
    }

}

</style>
