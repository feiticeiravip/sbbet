<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:Arial, sans-serif;
}

/* IFRAME */

iframe{
    width:100%;
    height:calc(100vh - 55px);
    border:none;
    display:block;
    background:#000;
}

/* BARRA SUPORTE */

.support-bar{
    width:100%;
    height:55px;
    background:#000;
    border-top:1px solid rgba(255,255,255,0.12);
    display:flex;
    align-items:center;
    justify-content:center;
    position:fixed;
    bottom:0;
    left:0;
    z-index:100;
}

.support-bar a{
    color:#fff;
    text-decoration:none;
    font-size:16px;
    font-weight:600;
    transition:0.3s;
}

.support-bar a:hover{
    opacity:0.8;
}

/* POPUP IMAGEM */

.popup-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.82);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
    padding:20px;
}

.popup-box{
    position:relative;
    max-width:950px;
    width:100%;
    animation:fade 0.35s ease;
}

.popup-box img{
    width:100%;
    border-radius:18px;
    display:block;
    box-shadow:0 0 45px rgba(0,0,0,0.5);
}

.close-popup{
    position:absolute;
    top:-15px;
    right:-15px;
    width:42px;
    height:42px;
    border:none;
    border-radius:50%;
    background:#000;
    color:#fff;
    font-size:24px;
    cursor:pointer;
    font-weight:bold;
    border:2px solid #fff;
}

@keyframes fade{
    from{
        opacity:0;
        transform:scale(0.92);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

@media(max-width:700px){

    .popup-box{
        max-width:100%;
    }

    .close-popup{
        width:38px;
        height:38px;
        font-size:20px;
        top:-10px;
        right:-10px;
    }

}

</style>

</head>
<body>

<!-- POPUP -->

<div class="popup-overlay" id="popup">

    <div class="popup-box">

        <button class="close-popup" onclick="fecharPopup()">×</button>

        <img src="superbancas.webp" alt="Super Bancas">

    </div>

</div>

<!-- IFRAME -->

<iframe
    src="https://app.superbancas.club/pr/1hROl7pY"

    allowfullscreen>

<!-- SUPORTE -->

<div class="support-bar">

    <a href="https://wa.me/5583993370071" target="_blank">
        Suporte — Preciso de suporte!
    </a>

</div>

<script>

function fecharPopup(){
    document.getElementById('popup').style.display = 'none';
}

</script>

</body>
