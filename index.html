<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:#000;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

/* CONTAINER */

.site-wrapper{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
}

/* IFRAME */

iframe{
    width:100%;
    flex:1;
    border:none;
    background:#000;
    display:block;
}

/* SUPORTE */

.support-bar{
    width:100%;
    height:28px;
    background:#000;
    border-top:1px solid rgba(255,255,255,0.08);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
}

.support-bar a{
    color:rgba(255,255,255,0.68);
    text-decoration:none;
    font-size:12px;
    transition:0.25s;
    letter-spacing:0.3px;
}

.support-bar a:hover{
    color:#ffffff;
}

/* POPUP */

.popup-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.82);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
    padding:20px;
}

.popup-box{
    position:relative;
    max-width:950px;
    width:100%;
    animation:fade 0.35s ease;
}

.popup-box img{
    width:100%;
    display:block;
    border-radius:18px;
    box-shadow:0 0 45px rgba(0,0,0,0.55);
}

.close-popup{
    position:absolute;
    top:-14px;
    right:-14px;
    width:40px;
    height:40px;
    border-radius:50%;
    border:2px solid #fff;
    background:#000;
    color:#fff;
    font-size:23px;
    font-weight:bold;
    cursor:pointer;
}

@keyframes fade{
    from{
        opacity:0;
        transform:scale(0.93);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

@media(max-width:700px){

    .support-bar{
        height:26px;
    }

    .support-bar a{
        font-size:11px;
    }

    .close-popup{
        width:36px;
        height:36px;
        font-size:20px;
    }

}

</style>

</head>
<body>

<!-- POPUP -->

<div class="popup-overlay" id="popup">

    <div class="popup-box">

        <button class="close-popup" onclick="fecharPopup()">×</button>

</div>

<!-- SITE -->

<div class="site-wrapper">

            Suporte — Preciso de suporte!
        </a>

    </div>

</div>

<script>

function fecharPopup(){
    document.getElementById('popup').style.display = 'none';
}

</script>

</body>
